    <link rel="shortcut icon" href="Images/Aminlogo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/1f156684a3.js" crossorigin="anonymous"></script>

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            max-width: 720px;
            width: 100%;
        }

        .hero-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .name {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.15s forwards;
        }

        .tagline {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.45s forwards;
        }

        .brewing {
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .socials {
            display: flex;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.75s forwards;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.25rem;
            transition: color 0.3s ease, transform 0.3s ease;
            text-decoration: none;
        }

        .socials a:hover {
            color: #fafafa;
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .hero-image {
                width: 120px;
                height: 120px;
                margin-bottom: 2rem;
            }

            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Images/iOSdevelop.jpg" alt="Amin Hamidi" class="hero-image" />
        <h1 class="name">Amin Reza</h1>
        <p class="tagline">Cybersecurity Professional, AI enthusiast, khoresh connoisseur.</p>
        <div class="divider"></div>
        <p class="brewing">Something is brewing...</p>
        <div class="socials">
            <a href="https://www.instagram.com/knowhataamin/" rel="noopener noreferrer" target="_blank" aria-label="Follow Amin on Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.linkedin.com/in/amin-hamidi-a02650157/" rel="noopener noreferrer" target="_blank" aria-label="Connect with Amin on LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
    </div>
</body>
</html>
